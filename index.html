<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntaxwear - Tênis e Sneakers Online</title>
    <meta name="description" content="Compre os melhores tênis e sneakers online na Syntaxwear. Encontre os últimos lançamentos, estilos exclusivos e ofertas imperdíveis. Transforme seu estilo com nossos calçados de alta qualidade.">
    <!-- Ligações para os arquivos CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components/header.css">
    <link rel="stylesheet" href="css/components/painel.css">
    <link rel="stylesheet" href="css/components/hero.css">
    <link rel="stylesheet" href="css/components/product-category.css">
    <link rel="stylesheet" href="css/components/product-grid.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/components/newsletter.css">

</head>

<body>
    <header class="header">
        <h1 class="logo">
            <a href="/" title="Syntaxwear - Tênis e Sneakers Online">
                <img src="./images/images/logo/logo.svg" alt="Syntaxwear - Tênis e Sneakers Online">
            </a>
        </h1>
        <div class="header-container">
            <!-- Logo e navegação -->
        </div>
        <nav class="nav-center" aria-label="Categorias Principais">

            <!-- Menu de navegação -->
            <ul>
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Outlet</a></li>
            </ul>
        </nav>
        <nav class="nav-right" aria-label="Acesso rápido">
            <ul>
                <li><a href="#">Nossas lojas</a></li>
                <li><a href="#">Sobre</a></li>
                <li>
                    <a href="#" aria-label="Minha conta">
                        <img src="./images/images/icons/user.svg" alt="Minha conta">

                    </a>
                </li>
                <li>
                    <a href="#" aria-label="Ajuda">
                        <img src="./images/images/icons/help.svg" alt="Ajuda">

                    </a>
                </li>
                <li>
                    <a href="#" aria-label="Carrinho">
                        <img src="./images/images/icons/bag.svg" alt="Carrinho">

                    </a>
                </li>
            </ul>

        </nav>
    </header>

    <main>
        <section class="hero">
            <!-- Seção principal com destaque -->
            <div class="hero-overlay">
                <div class="hero-content">
                    <span class="hero-subtitle">Krypton One</span>
                    <h2 class="hero-title">Transforme qualquer passo em presença.</h2>
                    <div class="hero-buttons">
                        <a class="btn btn-outline" href="#">Ver modelos</a>
                        <a class="btn btn-filled" href="#">Comprar</a>
                    </div>

                </div>
            </div>

        </section>

        <section class="categories-section">
            <!-- Seção de categorias de tênis -->
            
                <div class="category-card casual">
                    <span class="overlay"></span>
                    <button class="category-action" type="button">Casual</button>
                </div>
                <div class="category-card esporte">
                    <span class="overlay"></span>
                    <button class="category-action" type="button">Esporte</button>
                </div>
                <div class="category-card moderno">
                    <span class="overlay"></span>
                    <button class="category-action" type="button">Moderno</button>
                </div>
                <div class="category-card futurista">
                    <span class="overlay"></span>
                    <button class="category-action" type="button">Futurista</button>
                </div>
           
        </section>

        <section class="featured-products">
            <!-- Grid com produtos em destaque -->

        </section>

        <section class="newsletter">
            <!-- Newsletter -->
        </section>
    </main>

    <footer class="footer">
        <!-- Informações de contato e links -->
    </footer>
</body>

</html>
